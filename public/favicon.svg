<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 3x3 pixel grid forming a J shape: -->
  <!-- . X X -->
  <!-- . . X -->
  <!-- X X X -->
  <!-- Cell size: 32x32, gap: 8, origin: 8,8 -->
  <!-- Row 0 -->
  <rect x="48" y="8"  width="32" height="32" rx="5" class="fg"/> <!-- (0,1) -->
  <rect x="88" y="8"  width="32" height="32" rx="5" class="fg"/> <!-- (0,2) -->
  <!-- Row 1 -->
  <rect x="88" y="48" width="32" height="32" rx="5" class="fg"/> <!-- (1,2) -->
  <!-- Row 2 -->
  <rect x="8"  y="88" width="32" height="32" rx="5" class="fg"/> <!-- (2,0) -->
  <rect x="48" y="88" width="32" height="32" rx="5" class="fg"/> <!-- (2,1) -->
  <rect x="88" y="88" width="32" height="32" rx="5" class="fg"/> <!-- (2,2) -->
  <style>
    .fg { fill: #000; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #fff; }
    }
  </style>
</svg>
